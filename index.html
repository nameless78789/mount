<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forge Master Pet Summon Predictor</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --danger: #f87171;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #020617, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 1280px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .desc { color: var(--muted); margin-bottom: 20px; line-height: 1.55; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start; }
    .card {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }
    label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
    input, select, button {
      margin-top: 14px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary {
      background: var(--panel2);
      border: 1px solid var(--line);
    }
    .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .error { color: var(--danger); white-space: pre-wrap; margin-top: 12px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .mini {
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .mini .k { color: var(--muted); font-size: 12px; }
    .mini .v { margin-top: 4px; font-weight: 800; font-size: 16px; word-break: break-all; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: top; }
    th { color: var(--muted); background: #020617; position: sticky; top: 0; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .rarity-Common { color: #f1f1f1; }
    .rarity-Rare { color: #5dd8ff; }
    .rarity-Epic { color: #5dff8a; }
    .rarity-Legendary { color: #fcff5d; }
    .rarity-Ultimate { color: #ff5d5d; }
    .rarity-Mythic { color: #d55dff; }
    .bonus { color: var(--ok); font-weight: 800; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    @media (max-width: 900px) {
      .row { grid-template-columns: 1fr 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 560px) {
      .row { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pet Summon Predictor</h1>
    <div class="desc">
      Seed(HEX16)와 Level/Count(HEX16)를 입력하면 다음 펫 소환 결과를 예측합니다.
      실제 진행 시뮬레이션에서는 1뽑, 15뽑, 50뽑을 몇 번 실행할지 선택할 수 있습니다.
    </div>

    <div class="grid">
      <section class="card">
        <div class="row">
          <div>
            <label>Pet Seed (HEX16)</label>
            <input id="seed" value="" spellcheck="false" placeholder="예: 1234567812345678" />
          </div>
          <div>
            <label>Level/Count State (HEX16)</label>
            <input id="state" value="" spellcheck="false" placeholder="예: 1234567812345678" />
          </div>
          <div>
            <label>Extra Summon Chance (%)</label>
            <input id="extraChance" type="number" step="0.01" value="0" />
          </div>
          <div>
            <label>계산 모드</label>
            <select id="mode">
              <option value="simulate">실제 진행 시뮬레이션</option>
              <option value="normalOnly">기본 소환 결과열만 보기</option>
              <option value="bonusOnly">보너스 소환 결과열만 보기</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label>뽑기 종류</label>
            <select id="pullType">
              <option value="1">1뽑</option>
              <option value="15">15뽑</option>
              <option value="50">50뽑</option>
            </select>
          </div>
          <div>
            <label>소환 실행 횟수</label>
            <input id="pullRepeat" type="number" min="1" max="999" step="1" value="1" />
          </div>
          <div></div>
          <div></div>
        </div>
        <div class="hint">예: 15뽑 × 3회 = 15뽑을 3번 실행합니다. Level/Count는 직전까지 누적된 값입니다.</div>

        <div class="row">
          <div>
            <button id="runBtn">계산하기</button>
          </div>
          <div>
            <button id="csvBtn" type="button" class="secondary">CSV 저장</button>
          </div>
          <div></div>
          <div></div>
        </div>
        <div id="error" class="error"></div>
      </section>

      <section class="card">
        <div class="summary" id="summary"></div>
        <div style="overflow:auto; max-height: 720px; border-radius: 12px; border: 1px solid var(--line);">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>소비 Seed</th>
                <th>현재 Level/Count</th>
                <th>방식</th>
                <th>보너스판정</th>
                <th>등급</th>
                <th>스탯 1</th>
                <th>스탯 2</th>
                <th>완성도</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const U64_MASK = (1n << 64n) - 1n;
    const U32 = 4294967296;
    const MULT = 0x5851f42d4c957f2dn;
    const INIT_INC = 0x1a08ee1184ba6d32n;
    const STEP_INC = 0x14057b7ef767814fn;

    const RARITIES = ["Common", "Rare", "Epic", "Legendary", "Ultimate", "Mythic"];
    const RARITY_KOR = {
      Common: "일반", Rare: "희귀", Epic: "서사", Legendary: "전설", Ultimate: "궁극", Mythic: "신화"
    };

    const SUBSTATS_INFO = {
      "Critical Chance": [0.01, 0.12],
      "Critical Damage": [0.01, 0.80],
      "Block Chance": [0.01, 0.05],
      "Health Regen": [0.01, 0.04],
      "Life Steal": [0.01, 0.20],
      "Double Chance": [0.01, 0.20],
      "Damage": [0.01, 0.15],
      "Melee Damage": [0.01, 0.50],
      "Ranged Damage": [0.01, 0.15],
      "Attack Speed": [0.01, 0.40],
      "Skill Damage": [0.01, 0.30],
      "Skill Cooldown": [0.01, 0.07],
      "Health": [0.01, 0.15]
    };
    const SUBSTATS_POOL = Object.keys(SUBSTATS_INFO);
    const SUBSTAT_KOR = {
      "Critical Chance": "치명타 확률",
      "Critical Damage": "치명타 피해",
      "Block Chance": "블록",
      "Health Regen": "체력 재생",
      "Life Steal": "생명력 흡수",
      "Double Chance": "더블찬스",
      "Damage": "피해",
      "Melee Damage": "근접 피해",
      "Ranged Damage": "원거리 피해",
      "Attack Speed": "공격속도",
      "Skill Damage": "스킬 피해",
      "Skill Cooldown": "스킬 쿨",
      "Health": "체력"
    };

    class MetaplayPCG {
      constructor(seed) {
        this.state = (seed * MULT + INIT_INC) & U64_MASK;
      }
      nextPcg32() {
        const old = this.state;
        this.state = (old * MULT + STEP_INC) & U64_MASK;
        const xorshifted = Number((((old >> 18n) ^ old) >> 27n) & 0xFFFFFFFFn) >>> 0;
        const rot = Number((old >> 59n) & 0x1Fn);
        const leftShift = (xorshifted << ((~rot + 1) & 0x1F)) >>> 0;
        const rightShift = (xorshifted >>> rot) >>> 0;
        return (leftShift + rightShift) >>> 0;
      }
      nextF64() { return this.nextPcg32() / U32; }
      nextInt(maxVal) {
        if (maxVal <= 0) return 0;
        const raw = this.nextPcg32();
        const posVal = (raw >>> 1) & 0x7FFFFFFF;
        return posVal % maxVal;
      }
      nextULong() {
        const high = BigInt(this.nextPcg32());
        const low = BigInt(this.nextPcg32());
        return ((high << 32n) | low) & U64_MASK;
      }
      nextGuid() { this.nextULong(); this.nextULong(); }
    }

    function parseHex64(s, fieldName) {
      const clean = s.trim().replace(/^0x/i, "");
      if (!/^[0-9a-fA-F]{1,16}$/.test(clean)) throw new Error(`${fieldName}는 16자리 이하 HEX 값이어야 합니다.`);
      return BigInt("0x" + clean);
    }

    function hex64(v) {
      return (v & U64_MASK).toString(16).toUpperCase().padStart(16, "0");
    }

    function getSubstatValue(name, f64) {
      const [low, up] = SUBSTATS_INFO[name];
      return low + f64 * (up - low);
    }

    async function loadConfigs() {
      const eggResp = await fetch('./EggSummonConfig.json');
      if (!eggResp.ok) throw new Error('EggSummonConfig.json 로드 실패');
      const eggConfig = await eggResp.json();
      if (!Array.isArray(eggConfig.Levels) || eggConfig.Levels.length === 0) throw new Error('EggSummonConfig.json의 Levels 배열이 비어 있습니다.');

      let petCounts = { Common: 3, Rare: 4, Epic: 2, Legendary: 2, Ultimate: 2, Mythic: 2 };
      try {
        const petResp = await fetch('./PetLibrary.json');
        if (petResp.ok) {
          const petLib = await petResp.json();
          const counts = { Common: 0, Rare: 0, Epic: 0, Legendary: 0, Ultimate: 0, Mythic: 0 };
          const entries = Array.isArray(petLib) ? petLib.map((v, i) => [String(i), v]) : Object.entries(petLib);
          for (const [key, pet] of entries) {
            const petId = pet.PetId || pet.EggId || pet.MountId || pet.Id || {};
            const rarity = petId.Rarity || pet.Rarity || pet.rarity;
            if (counts[rarity] !== undefined) counts[rarity]++;
          }
          for (const rarity of RARITIES) {
            if (counts[rarity] > 0) petCounts[rarity] = counts[rarity];
          }
        }
      } catch (e) {
        console.warn('PetLibrary.json 로드 실패. 기본 개수 사용');
      }
      return { levels: eggConfig.Levels, petCounts };
    }

    function rollRarity(pcg, level, levels) {
      const lvlIdx = Math.min(level, levels.length - 1);
      const data = levels[lvlIdx];
      const raw = pcg.nextPcg32();
      let acc = 0;
      for (const rarity of RARITIES) {
        const chance = Number(data[rarity] || 0);
        acc += Math.round(chance * U32);
        if (raw < acc) return { rarity, lvlData: data };
      }
      return { rarity: "Common", lvlData: data };
    }

    function summonOne(seed, level, count, levels, petCounts, mode, extraChancePct) {
      const pcg = new MetaplayPCG(seed);
      let bonusTriggered = false;

      if (mode === "normal") {
        const bonusRaw = pcg.nextPcg32();
        const chanceRaw = Math.round((Number(extraChancePct) / 100) * U32);
        bonusTriggered = bonusRaw < chanceRaw;
      }

      const { rarity, lvlData } = rollRarity(pcg, level, levels);
      const countInRarity = Number(petCounts[rarity] || 1);
      pcg.nextInt(countInRarity);
      pcg.nextGuid();

      const numSubstats = ["Legendary", "Ultimate", "Mythic"].includes(rarity) ? 2 : 1;
      const availableStats = [...SUBSTATS_POOL];
      const stats = [];
      let f64Sum = 0;

      for (let i = 0; i < numSubstats; i++) {
        const statIdx = pcg.nextInt(availableStats.length);
        const statName = availableStats[statIdx];
        availableStats.splice(statIdx, 1);
        const f64 = pcg.nextF64();
        f64Sum += f64;
        stats.push({ name: statName, value: getSubstatValue(statName, f64) * 100, f64 });
      }

      let nextLevel = level;
      let nextCount = count + 1;
      const required = Number(lvlData.SummonsRequired || 999999999);
      if (nextCount >= required) {
        nextCount -= required;
        nextLevel += 1;
      }

      let displayLevel = level;
      let displayCount = count + 1;
      if (displayCount >= required) {
        displayCount -= required;
        displayLevel += 1;
      }

      return {
        seed,
        mode,
        displayLevel,
        displayCount,
        bonusTriggered,
        rarity,
        stats,
        perfection: (f64Sum / numSubstats) * 100,
        nextLevel,
        nextCount
      };
    }

    function consumePullBatch(batchSize, rows, state) {
      let totalTargetPulls = batchSize;
      let currentPullIdx = 0;

      while (currentPullIdx < totalTargetPulls) {
        const isBonusPull = currentPullIdx >= batchSize;
        const mode = isBonusPull ? "bonus" : "normal";
        const r = summonOne(state.currentSeed, state.level, state.count, state.levels, state.petCounts, mode, state.extraChancePct);
        rows.push(r);

        if (!isBonusPull && r.bonusTriggered) {
          totalTargetPulls += 1;
        }

        state.currentSeed = (state.currentSeed + 1n) & U64_MASK;
        state.level = r.nextLevel;
        state.count = r.nextCount;
        currentPullIdx += 1;
      }
    }

    async function simulate() {
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';
      try {
        const { levels, petCounts } = await loadConfigs();
        const initialSeed = parseHex64(document.getElementById('seed').value, 'Seed');
        const stateVal = parseHex64(document.getElementById('state').value, 'Level/Count');
        const extraChancePct = Number(document.getElementById('extraChance').value || 0);
        const batchSize = Number(document.getElementById('pullType').value);
        let repeatCount = Number(document.getElementById('pullRepeat').value);
        if (!Number.isInteger(repeatCount) || repeatCount < 1) repeatCount = 1;
        const repeatLimits = { 1: 100, 15: 30, 50: 10 };
        const maxRepeat = repeatLimits[batchSize] || 100;
        if (repeatCount > maxRepeat) repeatCount = maxRepeat;
        document.getElementById('pullRepeat').max = maxRepeat;
        document.getElementById('pullRepeat').value = repeatCount;
        const selectedMode = document.getElementById('mode').value;

        const startLevel = Number((stateVal >> 32n) & 0xFFFFFFFFn);
        const startCount = Number(stateVal & 0xFFFFFFFFn);
        const rows = [];
        const state = {
          currentSeed: initialSeed,
          level: startLevel,
          count: startCount,
          levels,
          petCounts,
          extraChancePct
        };

        if (selectedMode === 'normalOnly' || selectedMode === 'bonusOnly') {
          const mode = selectedMode === 'normalOnly' ? 'normal' : 'bonus';
          const totalPulls = batchSize * repeatCount;
          for (let i = 0; i < totalPulls; i++) {
            const r = summonOne(state.currentSeed, state.level, state.count, levels, petCounts, mode, extraChancePct);
            rows.push(r);
            state.currentSeed = (state.currentSeed + 1n) & U64_MASK;
            state.level = r.nextLevel;
            state.count = r.nextCount;
          }
        } else {
          for (let i = 0; i < repeatCount; i++) {
            consumePullBatch(batchSize, rows, state);
          }
        }

        render(rows, initialSeed, state.currentSeed, startLevel, startCount, state.level, state.count);
      } catch (err) {
        errorEl.textContent = err.message || String(err);
      }
    }

    let lastRows = [];

    function render(rows, startSeed, endSeed, startLevel, startCount, endLevel, endCount) {
      lastRows = rows;
      const bonusCount = rows.filter(r => r.mode === 'bonus').length;
      document.getElementById('summary').innerHTML = `
        <div class="mini"><div class="k">시작 Seed</div><div class="v code">${hex64(startSeed)}</div></div>
        <div class="mini"><div class="k">다음 Seed</div><div class="v code">${hex64(endSeed)}</div></div>
        <div class="mini"><div class="k">Level / Count</div><div class="v">Lv ${startLevel + 1} / ${startCount} → Lv ${endLevel + 1} / ${endCount}</div></div>
        <div class="mini"><div class="k">총 결과</div><div class="v">${rows.length}개 <span class="bonus">(+${bonusCount})</span></div></div>
      `;

      document.getElementById('tbody').innerHTML = rows.map((r, idx) => {
        const stat1 = r.stats[0] ? `${SUBSTAT_KOR[r.stats[0].name] || r.stats[0].name} +${r.stats[0].value.toFixed(2)}%` : '-';
        const stat2 = r.stats[1] ? `${SUBSTAT_KOR[r.stats[1].name] || r.stats[1].name} +${r.stats[1].value.toFixed(2)}%` : '-';
        const bonusText = r.mode === 'normal' ? (r.bonusTriggered ? '발동' : '-') : '체크 생략';
        return `
          <tr>
            <td>${idx + 1}</td>
            <td class="code">${hex64(r.seed)}</td>
            <td>Lv ${r.displayLevel + 1}<br>Count ${r.displayCount}</td>
            <td>${r.mode === 'normal' ? '기본' : '<span class="bonus">추가</span>'}</td>
            <td>${bonusText}</td>
            <td class="rarity-${r.rarity}"><b>${RARITY_KOR[r.rarity]}</b></td>
            <td>${stat1}</td>
            <td>${stat2}</td>
            <td>${r.perfection.toFixed(1)}%</td>
          </tr>
        `;
      }).join('');
    }

    function csvEscape(value) {
      const s = String(value ?? '');
      return `"${s.replace(/"/g, '""')}"`;
    }

    function downloadCsv() {
      if (!lastRows.length) {
        alert('저장할 결과가 없습니다. 먼저 계산하기를 실행하세요.');
        return;
      }

      const header = ['#', '소비 Seed', '현재 Level', '현재 Count', '방식', '보너스판정', '등급', '스탯 1', '스탯 2', '완성도'];
      const lines = [header.map(csvEscape).join(',')];

      lastRows.forEach((r, idx) => {
        const stat1 = r.stats[0] ? `${SUBSTAT_KOR[r.stats[0].name] || r.stats[0].name} +${r.stats[0].value.toFixed(2)}%` : '-';
        const stat2 = r.stats[1] ? `${SUBSTAT_KOR[r.stats[1].name] || r.stats[1].name} +${r.stats[1].value.toFixed(2)}%` : '-';
        const bonusText = r.mode === 'normal' ? (r.bonusTriggered ? '발동' : '-') : '체크 생략';
        const row = [
          idx + 1,
          hex64(r.seed),
          `Lv ${r.displayLevel + 1}`,
          `Count ${r.displayCount}`,
          r.mode === 'normal' ? '기본' : '추가',
          bonusText,
          RARITY_KOR[r.rarity],
          stat1,
          stat2,
          `${r.perfection.toFixed(1)}%`
        ];
        lines.push(row.map(csvEscape).join(','));
      });

      const csv = '﻿' + lines.join('
');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pet_summon_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function updateRepeatLimitHint() {
      const batchSize = Number(document.getElementById('pullType').value);
      const repeatLimits = { 1: 100, 15: 30, 50: 10 };
      const maxRepeat = repeatLimits[batchSize] || 100;
      const input = document.getElementById('pullRepeat');
      input.max = maxRepeat;
      if (Number(input.value) > maxRepeat) input.value = maxRepeat;
    }

    document.getElementById('runBtn').addEventListener('click', simulate);
    document.getElementById('csvBtn').addEventListener('click', downloadCsv);
    document.getElementById('pullType').addEventListener('change', updateRepeatLimitHint);
    updateRepeatLimitHint();
  </script>
</body>
</html>
