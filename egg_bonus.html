<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Bonus Scanner</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --danger: #f87171;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #020617, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 1180px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .desc { color: var(--muted); margin-bottom: 20px; line-height: 1.55; }
    .card {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      margin-bottom: 16px;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
    input, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #020617;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
    }
    button {
      margin-top: 14px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .table-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 10px;
    }
    .table-header button {
      width: auto;
      min-width: 120px;
      margin-top: 0;
      background: var(--panel2);
      border: 1px solid var(--line);
    }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .error { color: var(--danger); white-space: pre-wrap; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: top; }
    th { color: var(--muted); background: #020617; position: sticky; top: 0; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .bonus { color: var(--ok); font-weight: 800; }
    @media (max-width: 900px) { .row { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 560px) {
      body { padding: 12px; }
      .card { padding: 12px; }
      .row { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
      label { font-size: 11px; }
      input, select, button { font-size: 12px; padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pet Bonus Scanner</h1>
    <div class="desc">
      현재 Seed를 기준으로 Seed+0, Seed+1, Seed+2...에서 1뽑/15뽑/50뽑을 시작했을 때 보너스가 몇 개 나오는지 계산합니다.
      각 시작 Seed가 하나씩 증가할 때 Level/Count도 한 칸씩 증가한 위치로 계산합니다.
    </div>

    <section class="card">
      <div class="row">
        <div>
          <label>Pet Seed (HEX16)</label>
          <input id="seed" value="" spellcheck="false" placeholder="예: 1234567812345678" />
        </div>
        <div>
          <label>Level/Count State (HEX16)</label>
          <input id="state" value="" spellcheck="false" placeholder="예: 1234567812345678" />
        </div>
        <div>
          <label>Extra Summon Chance (%)</label>
          <input id="extraChance" type="number" step="0.01" value="0" />
        </div>
        <div>
          <label>뽑기 종류</label>
          <select id="pullType">
            <option value="1">1뽑</option>
            <option value="15" selected>15뽑</option>
            <option value="50">50뽑</option>
          </select>
        </div>
        <div>
          <label>분석할 시작 Seed 개수</label>
          <input id="scanCount" type="number" min="1" max="100" step="1" value="50" />
        </div>
      </div>
      <div class="hint">Level/Count는 직전까지 누적된 값입니다. 예: 0000005A0000000E = Lv 91에서 14개 소환 완료.</div>
      <button id="runBtn">보너스 개수 분석</button>
      <div id="error" class="error"></div>
    </section>

    <section class="card">
      <div class="table-header">
        <button id="csvBtn" type="button">CSV 저장</button>
      </div>
      <div style="overflow:auto; max-height: 720px; border-radius: 12px; border: 1px solid var(--line);">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>시작 Seed</th>
              <th>시작 Level/Count</th>
              <th>보너스 개수</th>
              <th>총 획득</th>
              <th>종료 Level/Count</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const U64_MASK = (1n << 64n) - 1n;
    const U32 = 4294967296;
    const MULT = 0x5851f42d4c957f2dn;
    const INIT_INC = 0x1a08ee1184ba6d32n;
    const STEP_INC = 0x14057b7ef767814fn;
    const RARITIES = ["Common", "Rare", "Epic", "Legendary", "Ultimate", "Mythic"];
    let lastRows = [];

    class MetaplayPCG {
      constructor(seed) {
        this.state = (seed * MULT + INIT_INC) & U64_MASK;
      }
      nextPcg32() {
        const old = this.state;
        this.state = (old * MULT + STEP_INC) & U64_MASK;
        const xorshifted = Number((((old >> 18n) ^ old) >> 27n) & 0xFFFFFFFFn) >>> 0;
        const rot = Number((old >> 59n) & 0x1Fn);
        const leftShift = (xorshifted << ((~rot + 1) & 0x1F)) >>> 0;
        const rightShift = (xorshifted >>> rot) >>> 0;
        return (leftShift + rightShift) >>> 0;
      }
      nextF64() { return this.nextPcg32() / U32; }
      nextInt(maxVal) {
        if (maxVal <= 0) return 0;
        const raw = this.nextPcg32();
        const posVal = (raw >>> 1) & 0x7FFFFFFF;
        return posVal % maxVal;
      }
      nextULong() {
        const high = BigInt(this.nextPcg32());
        const low = BigInt(this.nextPcg32());
        return ((high << 32n) | low) & U64_MASK;
      }
      nextGuid() { this.nextULong(); this.nextULong(); }
    }

    function parseHex64(s, fieldName) {
      const clean = s.trim().replace(/^0x/i, "");
      if (!/^[0-9a-fA-F]{1,16}$/.test(clean)) throw new Error(`${fieldName}는 16자리 이하 HEX 값이어야 합니다.`);
      return BigInt("0x" + clean);
    }

    function hex64(v) {
      return (v & U64_MASK).toString(16).toUpperCase().padStart(16, "0");
    }

    async function loadLevels() {
      const resp = await fetch('./EggSummonConfig.json');
      if (!resp.ok) throw new Error('EggSummonConfig.json 로드 실패');
      const config = await resp.json();
      if (!Array.isArray(config.Levels) || config.Levels.length === 0) throw new Error('EggSummonConfig.json의 Levels 배열이 비어 있습니다.');
      return config.Levels;
    }

    function rollRarity(pcg, level, levels) {
      const lvlIdx = Math.min(level, levels.length - 1);
      const data = levels[lvlIdx];
      const raw = pcg.nextPcg32();
      let acc = 0;
      for (const rarity of RARITIES) {
        const chance = Number(data[rarity] || 0);
        acc += Math.round(chance * U32);
        if (raw < acc) return { rarity, lvlData: data };
      }
      return { rarity: "Common", lvlData: data };
    }

    function consumeNormal(seed, level, count, levels, extraChancePct) {
      const pcg = new MetaplayPCG(seed);
      const bonusRaw = pcg.nextPcg32();
      const chanceRaw = Math.round((Number(extraChancePct) / 100) * U32);
      const bonusTriggered = bonusRaw < chanceRaw;

      const { rarity, lvlData } = rollRarity(pcg, level, levels);
      pcg.nextInt(1);
      pcg.nextGuid();
      const substats = ["Legendary", "Ultimate", "Mythic"].includes(rarity) ? 2 : 1;
      for (let i = 0; i < substats; i++) {
        pcg.nextInt(13 - i);
        pcg.nextF64();
      }

      let nextLevel = level;
      let nextCount = count + 1;
      const required = Number(lvlData.SummonsRequired || 999999999);
      if (nextCount >= required) {
        nextCount -= required;
        nextLevel += 1;
      }
      return { bonusTriggered, nextLevel, nextCount };
    }

    function consumeBonus(seed, level, count, levels) {
      const pcg = new MetaplayPCG(seed);
      const { rarity, lvlData } = rollRarity(pcg, level, levels);
      pcg.nextInt(1);
      pcg.nextGuid();
      const substats = ["Legendary", "Ultimate", "Mythic"].includes(rarity) ? 2 : 1;
      for (let i = 0; i < substats; i++) {
        pcg.nextInt(13 - i);
        pcg.nextF64();
      }

      let nextLevel = level;
      let nextCount = count + 1;
      const required = Number(lvlData.SummonsRequired || 999999999);
      if (nextCount >= required) {
        nextCount -= required;
        nextLevel += 1;
      }
      return { nextLevel, nextCount };
    }

    function advanceState(level, count, steps, levels) {
      let nextLevel = level;
      let nextCount = count;
      for (let i = 0; i < steps; i++) {
        const lvlIdx = Math.min(nextLevel, levels.length - 1);
        const required = Number(levels[lvlIdx].SummonsRequired || 999999999);
        nextCount += 1;
        if (nextCount >= required) {
          nextCount -= required;
          nextLevel += 1;
        }
      }
      return { level: nextLevel, count: nextCount };
    }

    async function scan() {
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';
      try {
        const levels = await loadLevels();
        const initialSeed = parseHex64(document.getElementById('seed').value, 'Seed');
        const stateVal = parseHex64(document.getElementById('state').value, 'Level/Count');
        const extraChancePct = Number(document.getElementById('extraChance').value || 0);
        const batchSize = Number(document.getElementById('pullType').value);
        let scanCount = Number(document.getElementById('scanCount').value);
        if (!Number.isInteger(scanCount) || scanCount < 1) scanCount = 1;
        if (scanCount > 100) scanCount = 100;
        document.getElementById('scanCount').max = 100;
        document.getElementById('scanCount').value = scanCount;

        const startLevel = Number((stateVal >> 32n) & 0xFFFFFFFFn);
        const startCount = Number(stateVal & 0xFFFFFFFFn);
        const rows = [];

        for (let i = 0; i < scanCount; i++) {
          let currentSeed = (initialSeed + BigInt(i)) & U64_MASK;
          const shiftedState = advanceState(startLevel, startCount, i, levels);
          let level = shiftedState.level;
          let count = shiftedState.count;
          const displayStartLevel = level;
          const displayStartCount = count + 1;
          let bonusCount = 0;

          for (let j = 0; j < batchSize; j++) {
            const r = consumeNormal(currentSeed, level, count, levels, extraChancePct);
            if (r.bonusTriggered) bonusCount++;
            currentSeed = (currentSeed + 1n) & U64_MASK;
            level = r.nextLevel;
            count = r.nextCount;
          }

          for (let j = 0; j < bonusCount; j++) {
            const r = consumeBonus(currentSeed, level, count, levels);
            currentSeed = (currentSeed + 1n) & U64_MASK;
            level = r.nextLevel;
            count = r.nextCount;
          }

          rows.push({
            index: i + 1,
            startSeed: (initialSeed + BigInt(i)) & U64_MASK,
            startLevel: displayStartLevel,
            startCount: displayStartCount,
            bonusCount,
            total: batchSize + bonusCount,
            endLevel: advanceState(displayStartLevel, displayStartCount - 1, batchSize + bonusCount - 1, levels).level,
            endCount: advanceState(displayStartLevel, displayStartCount - 1, batchSize + bonusCount - 1, levels).count + 1
          });
        }

        render(rows);
      } catch (err) {
        errorEl.textContent = err.message || String(err);
      }
    }

    function render(rows) {
      lastRows = rows;
      document.getElementById('tbody').innerHTML = rows.map(r => `
        <tr>
          <td>${r.index}</td>
          <td class="code">${hex64(r.startSeed)}</td>
          <td>Lv ${r.startLevel + 1}<br>Count ${r.startCount}</td>
          <td><b class="bonus">${r.bonusCount}</b></td>
          <td>${r.total}</td>
          <td>Lv ${r.endLevel + 1}<br>Count ${r.endCount}</td>
        </tr>
      `).join('');
    }

    function csvEscape(value) {
      const s = String(value ?? '');
      return `"${s.replace(/"/g, '""')}"`;
    }

    function downloadCsv() {
      if (!lastRows.length) {
        alert('저장할 결과가 없습니다. 먼저 분석을 실행하세요.');
        return;
      }

      const header = ['#', '시작 Seed', '시작 Level', '시작 Count', '보너스 개수', '총 획득', '종료 Level', '종료 Count'];
      const lines = [header.map(csvEscape).join(',')];

      lastRows.forEach(r => {
        const row = [
          r.index,
          hex64(r.startSeed),
          `Lv ${r.startLevel + 1}`,
          `Count ${r.startCount}`,
          r.bonusCount,
          r.total,
          `Lv ${r.endLevel + 1}`,
          `Count ${r.endCount}`
        ];
        lines.push(row.map(csvEscape).join(','));
      });

      const csv = '﻿' + lines.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pet_bonus_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    document.getElementById('runBtn').addEventListener('click', scan);
    document.getElementById('csvBtn').addEventListener('click', downloadCsv);
  </script>
</body>
</html>
